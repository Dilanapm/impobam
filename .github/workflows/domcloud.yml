name: Sync on DOM Cloud

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke deployment hook
        uses: distributhor/workflow-webhook@v3
        env:
          webhook_url: https://my.domcloud.co/api/githubdeploy
          webhook_secret: ${{ secrets.WEBHOOK_SECRET }}
          webhook_auth: ${{ secrets.WEBHOOK_AUTH }}
          data: '{"commands":["git pull origin main","composer install --no-dev --optimize-autoloader","if [ -f package-lock.json ]; then npm ci; else npm install; fi","npm run build","php artisan config:clear","php artisan cache:clear","php artisan optimize:clear","php artisan migrate --force","php artisan optimize"]}'