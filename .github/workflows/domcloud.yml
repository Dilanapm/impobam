name: Sync on DOM Cloud

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke deployment hook (no migrations)
        if: github.event_name == 'push'
        uses: distributhor/workflow-webhook@v3
        env:
          webhook_url: https://my.domcloud.co/api/githubdeploy
          webhook_secret: ${{ secrets.WEBHOOK_SECRET }}
          webhook_auth: ${{ secrets.WEBHOOK_AUTH }}
          data: '{"commands":["rm -rf public/vendor/livewire","git pull origin main","composer install --no-dev --optimize-autoloader","php artisan livewire:publish --assets","if [ -f package-lock.json ]; then npm ci; else npm install; fi","npm run build","php artisan config:clear","php artisan cache:clear","php artisan optimize:clear","php artisan optimize"]}'

      - name: Invoke deployment hook (with migrations)
        if: github.event_name == 'workflow_dispatch'
        uses: distributhor/workflow-webhook@v3
        env:
          webhook_url: https://my.domcloud.co/api/githubdeploy
          webhook_secret: ${{ secrets.WEBHOOK_SECRET }}
          webhook_auth: ${{ secrets.WEBHOOK_AUTH }}
          data: '{"commands":["rm -rf public/vendor/livewire","git pull origin main","composer install --no-dev --optimize-autoloader","php artisan livewire:publish --assets","if [ -f package-lock.json ]; then npm ci; else npm install; fi","npm run build","php artisan config:clear","php artisan cache:clear","php artisan optimize:clear","php artisan migrate --force","php artisan optimize"]}'